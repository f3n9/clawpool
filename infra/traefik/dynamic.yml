http:
  routers:
    openclaw:
      # Keep this host in sync with OPENCLAW_HOST in infra/.env.
      rule: "Host(`openclaw.company.internal`) && PathPrefix(`/`)"
      entryPoints:
        - web
      service: oauth2-proxy

  services:
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: "http://oauth2-proxy:4180"
