http:
  routers:
    openclaw-help:
      rule: "(Host(`claw.hatch.yinxiang.com`) || Host(`openclaw.company.internal`)) && PathPrefix(`/help`)"
      entryPoints:
        - web
      priority: 100
      service: instance-manager

    openclaw:
      # Keep these hosts in sync with OPENCLAW_HOST in infra/.env.
      rule: "(Host(`claw.hatch.yinxiang.com`) || Host(`openclaw.company.internal`)) && PathPrefix(`/`)"
      entryPoints:
        - web
      service: oauth2-proxy

  services:
    instance-manager:
      loadBalancer:
        servers:
          - url: "http://instance-manager:8080"

    oauth2-proxy:
      loadBalancer:
        servers:
          - url: "http://oauth2-proxy:4180"
