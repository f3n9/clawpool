provider = "oidc"
http_address = "0.0.0.0:4180"

email_domains = [ "*" ]
upstreams = [ "http://instance-manager:8080" ]

# Keep upstream identity headers only; do not stuff provider tokens into session cookies.
pass_access_token = false
pass_authorization_header = false
pass_user_headers = true
scope = "openid profile email"
code_challenge_method = "S256"
upstream_timeout = "180s"

# Avoid oversized split cookies that can cause unstable login loops (especially with MFA flows).
session_store_type = "redis"
redis_connection_url = "redis://redis:6379"
cookie_name = "_oc_oauth2_proxy"
cookie_secure = true
cookie_samesite = "lax"
# In this deployment, upstreams only need identity headers; forcing short refresh windows
# can trigger unnecessary re-auth/MFA prompts with some IdP policies (e.g. DUO step-up).
cookie_refresh = "0"
cookie_expire = "12h"
# Avoid CSRF cookie collisions when browsers send parallel unauthenticated requests.
cookie_csrf_per_request = true

# Keycloak custom claim forwarding
oidc_groups_claim = "groups"
# Recommendation: map Keycloak employee_id -> preferred_username via protocol mapper.
user_id_claim = "preferred_username"

# Use headers consumed by instance-manager
set_authorization_header = false
skip_provider_button = true
silence_ping_logging = true
exclude_logging_paths = ["/ping", "/ready"]
