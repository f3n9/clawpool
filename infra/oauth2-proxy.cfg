provider = "oidc"
http_address = "0.0.0.0:4180"

email_domains = [ "*" ]
upstreams = [ "http://instance-manager:8080" ]

pass_access_token = true
pass_authorization_header = true
pass_user_headers = true
scope = "openid profile email"
upstream_timeout = "180s"

# Keycloak custom claim forwarding
oidc_groups_claim = "groups"
# Recommendation: map Keycloak employee_id -> preferred_username via protocol mapper.
user_id_claim = "preferred_username"

# Use headers consumed by instance-manager
set_authorization_header = true
skip_provider_button = true
silence_ping_logging = true
exclude_logging_paths = ["/ping", "/ready"]
