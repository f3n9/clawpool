services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik/dynamic:ro
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    depends_on:
      - redis
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    environment:
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_ISSUER_URL}
      OAUTH2_PROXY_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://${OPENCLAW_HOST}/oauth2/callback
      OAUTH2_PROXY_COOKIE_SECRET: ${OPENCLAW_OAUTH2_COOKIE_SECRET}
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    restart: unless-stopped

  instance-manager:
    build:
      context: ../services/instance-manager
    environment:
      OPENCLAW_JIT_PROVISION: ${OPENCLAW_JIT_PROVISION}
      OPENCLAW_HOST: ${OPENCLAW_HOST}
      OPENCLAW_ALLOWED_EMAIL_DOMAINS: ${OPENCLAW_ALLOWED_EMAIL_DOMAINS}
      OPENCLAW_ALLOWED_GROUPS: ${OPENCLAW_ALLOWED_GROUPS}
      OPENCLAW_USERS_ROOT: ${OPENCLAW_USERS_ROOT}
      OPENCLAW_IMAGE: ${OPENCLAW_IMAGE}
      OPENCLAW_IMAGE_TAG: ${OPENCLAW_IMAGE_TAG}
      OPENCLAW_DOCKER_NETWORK: ${OPENCLAW_DOCKER_NETWORK}
      OPENCLAW_INSTANCE_PORT: ${OPENCLAW_INSTANCE_PORT}
      OPENCLAW_CONTAINER_DATA_PATH: ${OPENCLAW_CONTAINER_DATA_PATH}
      OPENCLAW_CONTAINER_CONFIG_PATH: ${OPENCLAW_CONTAINER_CONFIG_PATH}
      OPENCLAW_CONTAINER_RUNTIME_PATH: ${OPENCLAW_CONTAINER_RUNTIME_PATH}
      OPENCLAW_CONTAINER_UID: ${OPENCLAW_CONTAINER_UID}
      OPENCLAW_CONTAINER_GID: ${OPENCLAW_CONTAINER_GID}
      OPENCLAW_STARTUP_CMD: ${OPENCLAW_STARTUP_CMD}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_CONTROL_UI_ORIGIN: ${OPENCLAW_CONTROL_UI_ORIGIN:-}
      OPENCLAW_GATEWAY_AUTH_MODE: ${OPENCLAW_GATEWAY_AUTH_MODE:-trusted-proxy}
      OPENCLAW_GATEWAY_AUTH_TOKEN: ${OPENCLAW_GATEWAY_AUTH_TOKEN:-}
      OPENCLAW_GATEWAY_TRUSTED_PROXY_USER_HEADER: ${OPENCLAW_GATEWAY_TRUSTED_PROXY_USER_HEADER:-host}
      OPENCLAW_GATEWAY_TRUSTED_PROXIES: ${OPENCLAW_GATEWAY_TRUSTED_PROXIES:-127.0.0.1/32,172.16.0.0/12}
      OPENCLAW_DEFAULT_CHANNEL_PLUGINS: ${OPENCLAW_DEFAULT_CHANNEL_PLUGINS:-telegram,wecom}
      OPENCLAW_DEFAULT_OPENAI_KEY: ${OPENCLAW_DEFAULT_OPENAI_KEY}
      OPENCLAW_OPENAI_API: ${OPENCLAW_OPENAI_API:-}
      OPENCLAW_ALLOWED_MODELS: ${OPENCLAW_ALLOWED_MODELS}
      OPENCLAW_DEFAULT_OPENAI_MODEL: ${OPENCLAW_DEFAULT_OPENAI_MODEL}
      OPENCLAW_HEALTH_TIMEOUT_SECONDS: ${OPENCLAW_HEALTH_TIMEOUT_SECONDS}
      OPENCLAW_RUNNING_READY_SECONDS: ${OPENCLAW_RUNNING_READY_SECONDS}
      OPENCLAW_IDLE_MINUTES: ${OPENCLAW_IDLE_MINUTES}
      OPENCLAW_STARTUP_MAX_CONCURRENT: ${OPENCLAW_STARTUP_MAX_CONCURRENT}
      OPENCLAW_DEFAULT_OPENAI_ENDPOINT: ${OPENCLAW_DEFAULT_OPENAI_ENDPOINT}
      OPENCLAW_BASE_CPU: ${OPENCLAW_BASE_CPU}
      OPENCLAW_BASE_MEM: ${OPENCLAW_BASE_MEM}
      OPENCLAW_BOOST_CPU: ${OPENCLAW_BOOST_CPU}
      OPENCLAW_BOOST_MEM: ${OPENCLAW_BOOST_MEM}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/openclaw/users:/srv/openclaw/users
    restart: unless-stopped

  idle-controller:
    build:
      context: ../services/idle-controller
    command:
      - /bin/sh
      - -c
      - while true; do python -m idle_controller.main; sleep 60; done
    environment:
      OPENCLAW_IDLE_MINUTES: ${OPENCLAW_IDLE_MINUTES}
      OPENCLAW_USERS_ROOT: ${OPENCLAW_USERS_ROOT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/openclaw/users:/srv/openclaw/users
    restart: unless-stopped

  resource-controller:
    build:
      context: ../services/resource-controller
    command:
      - /bin/sh
      - -c
      - while true; do python -m resource_controller.main; sleep 120; done
    environment:
      OPENCLAW_BOOST_THRESHOLD: 10
      OPENCLAW_BASE_CPU: ${OPENCLAW_BASE_CPU}
      OPENCLAW_BASE_MEM: ${OPENCLAW_BASE_MEM}
      OPENCLAW_BOOST_CPU: ${OPENCLAW_BOOST_CPU}
      OPENCLAW_BOOST_MEM: ${OPENCLAW_BOOST_MEM}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
