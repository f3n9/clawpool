<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw 控制台示意图</title>
  <desc id="desc">展示控制台页面的终端布局，可用于查看状态、执行命令和排查问题。</desc>
  <rect width="1440" height="900" fill="#020617"/>
  <rect x="56" y="40" width="1328" height="820" rx="28" fill="#0b1020" stroke="#334155" stroke-width="2"/>
  <rect x="56" y="40" width="1328" height="70" rx="28" fill="#111827"/>
  <rect x="88" y="66" width="250" height="22" rx="8" fill="#1e293b"/>
  <rect x="1110" y="62" width="210" height="30" rx="15" fill="#1e293b"/>
  <text x="96" y="88" font-size="26" font-family="Arial, sans-serif" fill="#e2e8f0">OpenClaw Container Console</text>
  <text x="1124" y="83" font-size="18" font-family="Arial, sans-serif" fill="#94a3b8">Auto-fit enabled</text>
  <text x="92" y="170" font-size="30" font-family="Courier New, monospace" fill="#93c5fd">node@openclaw:~$ openclaw status</text>
  <text x="92" y="220" font-size="28" font-family="Courier New, monospace" fill="#22c55e">Gateway reachable · Browser control ready</text>
  <text x="92" y="270" font-size="28" font-family="Courier New, monospace" fill="#e5e7eb">Sessions: 1 active · Default model: MiniMax-M2.5</text>
  <text x="92" y="320" font-size="28" font-family="Courier New, monospace" fill="#e5e7eb">Channels: Telegram / 企业微信 / 更多内置渠道</text>
  <rect x="84" y="372" width="1272" height="280" rx="20" fill="#020617" stroke="#1e293b"/>
  <text x="108" y="432" font-size="26" font-family="Courier New, monospace" fill="#a5b4fc">常见用途</text>
  <text x="108" y="486" font-size="24" font-family="Courier New, monospace" fill="#e2e8f0">1. 查看状态：openclaw status</text>
  <text x="108" y="530" font-size="24" font-family="Courier New, monospace" fill="#e2e8f0">2. 查看模型：/models 或 /model</text>
  <text x="108" y="574" font-size="24" font-family="Courier New, monospace" fill="#e2e8f0">3. 查看渠道：/channels</text>
  <text x="108" y="618" font-size="24" font-family="Courier New, monospace" fill="#e2e8f0">4. 排查问题：查看日志、执行诊断命令</text>
  <rect x="92" y="730" width="1000" height="40" rx="20" fill="#111827"/>
  <rect x="1112" y="718" width="180" height="64" rx="20" fill="#1d4ed8"/>
  <text x="1172" y="758" font-size="26" font-family="Arial, sans-serif" fill="#ffffff">回车执行</text>
  <text x="96" y="830" font-size="28" font-family="Arial, sans-serif" fill="#94a3b8">示意图：控制台适合查看状态、执行命令和排查问题</text>
</svg>
