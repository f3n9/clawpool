<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Dashboard 示例图</title>
  <desc id="desc">展示登录后 Dashboard 的示意布局，包括顶部导航、聊天区和输入框。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="64" y="48" width="1312" height="804" rx="28" fill="#f8fafc"/>
  <rect x="64" y="48" width="1312" height="76" rx="28" fill="#e2e8f0"/>
  <circle cx="112" cy="86" r="10" fill="#22c55e"/>
  <rect x="144" y="70" width="220" height="30" rx="8" fill="#cbd5e1"/>
  <rect x="1096" y="68" width="120" height="34" rx="17" fill="#dbeafe"/>
  <rect x="1232" y="68" width="96" height="34" rx="17" fill="#dcfce7"/>
  <rect x="104" y="164" width="280" height="588" rx="22" fill="#f1f5f9"/>
  <rect x="424" y="164" width="912" height="588" rx="22" fill="#ffffff"/>
  <rect x="456" y="204" width="420" height="72" rx="18" fill="#dbeafe"/>
  <rect x="900" y="204" width="240" height="72" rx="18" fill="#e2e8f0"/>
  <rect x="456" y="304" width="640" height="110" rx="20" fill="#eff6ff"/>
  <rect x="456" y="436" width="520" height="96" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="456" y="556" width="720" height="96" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="456" y="776" width="720" height="40" rx="20" fill="#dbeafe"/>
  <rect x="1196" y="764" width="104" height="64" rx="18" fill="#2563eb"/>
  <text x="110" y="714" font-size="28" font-family="Arial, sans-serif" fill="#0f172a">左侧：最近会话 / 常用入口</text>
  <text x="456" y="336" font-size="28" font-family="Arial, sans-serif" fill="#1d4ed8">聊天区：查看回答、继续追问</text>
  <text x="456" y="476" font-size="26" font-family="Arial, sans-serif" fill="#334155">输入区：输入“你好”开始对话</text>
  <text x="456" y="610" font-size="26" font-family="Arial, sans-serif" fill="#334155">可发送普通问题、命令，或让 OpenClaw 帮你处理任务</text>
  <text x="1070" y="808" font-size="26" font-family="Arial, sans-serif" fill="#ffffff">发送</text>
  <text x="96" y="828" font-size="28" font-family="Arial, sans-serif" fill="#475569">示意图：登录后的 Dashboard 主要区域</text>
</svg>
